# Railway service config — AgentFlow backend.
#
# Reference: DEPLOYMENT.md "Railway single-service deploy".
#
# Railway reads this file when a service is created from the repo root.
# We declare Docker build (not Nixpacks) so we can ship the same image
# that we test locally in `docker-compose.yml` — no surprise rebuilds
# from a freshly-inferred requirements.txt on every push.
#
# One service = one container = one public URL. Scale by bumping
# numReplicas (Railway load-balances across them; Postgres checkpointer
# is safe to share because LangGraph checkpoints are atomic per-thread).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# `healthcheckPath` is what Railway polls to mark a deploy healthy /
# unhealthy. /healthz is the cheap liveness probe (no DB, no graph).
# It MUST return 200 within startTimeoutMs or Railway marks the
# deploy as failed and rolls back to the previous successful image.
healthcheckPath = "/healthz"
healthcheckTimeout = 10
# Cold start: pip layer is cached, but the sentence-transformer model
# downloads the first time (or is restored from Railway's volume on
# warm starts). 90s is comfortable; tighten once you measure.
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 60"
startupSleepSecs = 0
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# 1 replica is the safe default — in-process state (sentence-transformer
# model, FAISS indexes) doubles memory per replica.
numReplicas = 1

# Production environment baseline. Real secrets are set in the
# Railway dashboard / `railway variables` CLI, NOT committed here.
# `ENVIRONMENT=production` flips the pydantic-settings validator into
# strict mode (JWT_SECRET becomes required, fail-fast at startup).
#
# NOTE: Railway's [env] table is not officially supported in railway.toml.
# Set these variables via the Railway dashboard or `railway variables set`:
#   ENVIRONMENT=production
#   LOG_LEVEL=info
#   CORS_ORIGINS=https://your-frontend.up.railway.app
#   HOST=0.0.0.0
#
# POSTGRES_CONN_STRING is injected automatically by Railway when a
# Postgres plugin is attached to this service — do not set it manually.
# DATA_DIR / FAISS_INDEX_DIR / LTM_INDEX_DIR default to the paths the
# Dockerfile creates, which are the same paths the named volumes mount
# in docker-compose.yml. On Railway, add volumes mounted at:
#   /app/data, /app/faiss_indexes, /app/ltm_indexes, /app/.faiss_secret
