<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b6573" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="700" fill="#fbfaf8"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-size="24" font-weight="600" fill="#1f2328">AgentFlow — Multi-Agent LangGraph Architecture</text>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#6b7280">Stateful routing · parallel agent execution · durable checkpointing · human-in-the-loop</text>

  <!-- State container -->
  <rect x="40" y="110" width="820" height="500" rx="14" fill="none" stroke="#d8d4cc" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="58" y="132" font-size="12.5" fill="#9a9488" font-style="italic">Persistent graph state — TypedDict, checkpointed after every node transition</text>

  <!-- User Query -->
  <rect x="370" y="50" width="0" height="0" fill="none"/>
  <g>
    <rect x="350" y="84" width="200" height="0" fill="none"/>
  </g>

  <!-- Input node -->
  <g>
    <rect x="365" y="148" width="170" height="50" rx="10" fill="#ffffff" stroke="#c9c2b6" stroke-width="1.4"/>
    <text x="450" y="178" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1f2328">User Query</text>
  </g>
  <line x1="450" y1="198" x2="450" y2="226" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Router -->
  <g>
    <rect x="330" y="226" width="240" height="62" rx="10" fill="#efe6fb" stroke="#b89ee0" stroke-width="1.4"/>
    <text x="450" y="251" text-anchor="middle" font-size="15" font-weight="700" fill="#5b3a8c">Router Agent</text>
    <text x="450" y="271" text-anchor="middle" font-size="12" fill="#6e5490">conditional_edges · intent classification</text>
  </g>

  <!-- Router branches -->
  <path d="M450,288 L450,312 L150,312 L150,332" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="450" y1="288" x2="450" y2="332" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M450,288 L450,312 L750,312 L750,332" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Research Agent -->
  <g>
    <rect x="55" y="332" width="190" height="62" rx="10" fill="#e1f3f1" stroke="#7fc4bc" stroke-width="1.4"/>
    <text x="150" y="357" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1f6e64">Research Agent</text>
    <text x="150" y="377" text-anchor="middle" font-size="11.5" fill="#3a8378">Tavily web search · FAISS retrieval</text>
  </g>

  <!-- Analysis Agent -->
  <g>
    <rect x="355" y="332" width="190" height="62" rx="10" fill="#e1f3f1" stroke="#7fc4bc" stroke-width="1.4"/>
    <text x="450" y="357" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1f6e64">Analysis Agent</text>
    <text x="450" y="377" text-anchor="middle" font-size="11.5" fill="#3a8378">code tool · document comparison</text>
  </g>

  <!-- Chat Agent -->
  <g>
    <rect x="655" y="332" width="190" height="62" rx="10" fill="#e1f3f1" stroke="#7fc4bc" stroke-width="1.4"/>
    <text x="750" y="357" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1f6e64">Chat Agent</text>
    <text x="750" y="377" text-anchor="middle" font-size="11.5" fill="#3a8378">direct reply · no tool calls</text>
  </g>

  <!-- Agents -> Synthesizer -->
  <path d="M150,394 L150,440 L450,440 L450,460" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="450" y1="394" x2="450" y2="460" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M750,394 L750,440 L450,440 L450,460" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Synthesizer -->
  <g>
    <rect x="330" y="460" width="240" height="62" rx="10" fill="#fbe5dd" stroke="#e3a48c" stroke-width="1.4"/>
    <text x="450" y="485" text-anchor="middle" font-size="15" font-weight="700" fill="#a8472a">Synthesizer</text>
    <text x="450" y="505" text-anchor="middle" font-size="12" fill="#b85f43">merges agent outputs · formats citations</text>
  </g>
  <line x1="450" y1="522" x2="450" y2="550" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Human Review -->
  <g>
    <rect x="330" y="550" width="240" height="62" rx="10" fill="#fdf0d5" stroke="#e3c280" stroke-width="1.4"/>
    <text x="450" y="575" text-anchor="middle" font-size="15" font-weight="700" fill="#9c7416">Human Review</text>
    <text x="450" y="595" text-anchor="middle" font-size="12" fill="#ab8a3a">interrupt() · approve or edit draft</text>
  </g>

  <!-- Checkpointer pill -->
  <rect x="615" y="560" width="220" height="34" rx="17" fill="#ffffff" stroke="#c9c2b6" stroke-width="1.2"/>
  <text x="725" y="582" text-anchor="middle" font-size="12" fill="#6b7280">SQLite checkpointer (thread_id)</text>

  <!-- Final output -->
  <line x1="450" y1="612" x2="450" y2="636" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <g>
    <rect x="365" y="636" width="170" height="50" rx="10" fill="#ffffff" stroke="#c9c2b6" stroke-width="1.4"/>
    <text x="450" y="666" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1f2328">Final Output</text>
  </g>

</svg>
