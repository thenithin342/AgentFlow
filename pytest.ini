[pytest]
# Suppress known deprecation warnings that are not actionable yet.
# Scope to specific modules so we don't swallow deprecations from our own code.
filterwarnings =
    ignore::DeprecationWarning:langchain_community
    ignore::PendingDeprecationWarning:langchain
    ignore::PendingDeprecationWarning:langchain_community
log_cli = false
log_level = ERROR
# Run async tests without an explicit @pytest.mark.asyncio per test.
# `asyncio_mode = auto` silences the pytest-asyncio deprecation warning
# ("asyncio_mode not set, defaulting to strict") and matches the project's
# async-everywhere test style (httpx.AsyncClient for API tests).
asyncio_mode = auto
# Pin test discovery to tests/ — otherwise pytest collects `*.py` from
# the repo root (debug_stream.py, inspect_db.py, verify_fixes.py) and
# emits confusing import errors. Limiting testpaths keeps `pytest`
# from the project root clean.
testpaths = tests
