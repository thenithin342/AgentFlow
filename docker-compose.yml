# AgentFlow — local development & production-deploy topology.
#
# Services:
#   - postgres   — durable checkpointer backend (opt-in via --profile postgres)
#   - qdrant     — vector store for RAG + LTM (opt-in via --profile qdrant)
#   - backend    — the FastAPI app, built from ./Dockerfile
#
# Reference: DEPLOYMENT.md section 3.3 "docker-compose topology".
#
# Dev (SQLite, no Postgres, no Qdrant — uses local FAISS):
#   docker-compose up backend
#
# Dev + Qdrant (RAG/LTM stored in Qdrant, horizontally scalable):
#   docker-compose --profile qdrant up
#
# Dev + Postgres + Qdrant (full production-like stack):
#   docker-compose --profile postgres --profile qdrant up

services:
  # ---------------------------------------------------------------------------
  # Postgres — checkpointer backend (opt-in; use --profile postgres)
  # ---------------------------------------------------------------------------
  postgres:
    profiles: [postgres]
    image: postgres:16-alpine
    container_name: agentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-agentflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow} -d ${POSTGRES_DB:-agentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Qdrant — vector store for RAG + LTM (opt-in; use --profile qdrant)
  # ---------------------------------------------------------------------------
  qdrant:
    profiles: [qdrant]
    image: qdrant/qdrant:latest
    container_name: agentflow-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      # REST API — used by the Python client
      - "127.0.0.1:6333:6333"
      # gRPC — optional high-throughput interface
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Backend — FastAPI app
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-backend
    restart: unless-stopped
    # Only wait for postgres when the postgres profile is active.
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      qdrant:
        condition: service_healthy
        required: false
    environment:
      # --- Required at runtime ---
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY is required}
      TAVILY_API_KEY: ${TAVILY_API_KEY:?TAVILY_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a 32+ byte secret in production}
      # --- Database ---
      POSTGRES_CONN_STRING: ${POSTGRES_CONN_STRING:-}
      CHECKPOINT_DB_PATH: /app/agentflow.db
      # --- Persistence dirs ---
      DATA_DIR: /app/data
      FAISS_INDEX_DIR: /app/faiss_indexes
      LTM_INDEX_DIR: /app/ltm_indexes
      # --- Qdrant (Sprint 4) — set QDRANT_URL to enable Qdrant backend ---
      # When using the qdrant profile, this points to the local container.
      # For Qdrant Cloud, override with the cloud URL from .env.
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_PREFER_GRPC: ${QDRANT_PREFER_GRPC:-false}
      # --- Optional: LangSmith tracing ---
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-AgentFlow}
      # --- CORS ---
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      # --- Log level ---
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - backend_data:/app/data
      - backend_faiss:/app/faiss_indexes
      - backend_ltm:/app/ltm_indexes
      # Mount the HMAC secret file so it persists across container restarts.
      # Create an empty file first:  touch .faiss_secret
      - ./.faiss_secret:/app/.faiss_secret
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "3", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  backend_data:
    driver: local
  backend_faiss:
    driver: local
  backend_ltm:
    driver: local
